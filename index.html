<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Doctrinal TDT</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --primary: #00b37e;
            --border: #29292e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: var(--primary);
            font-size: 24px;
            text-align: center;
            margin-bottom: 8px;
        }
        p.subtitle {
            text-align: center;
            color: #8d8d99;
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #202024;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-color);
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: #white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #00875f;
        }
        button:disabled {
            background-color: #29292e;
            color: #7c7c8a;
            cursor: not-allowed;
        }
        #result {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 15px;
        }
        .loading {
            text-align: center;
            color: #e1e1e6;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Analizador Doctrinal TDT</h1>
    <p class="subtitle">Evaluación de textos a la luz de la verdad bíblica</p>

    <div class="card">
        <label for="textInput">Pegá el texto o versículo a analizar:</label>
        <textarea id="textInput" placeholder="Escribí o pegá acá el fragmento que querés pasar por el juicio doctrinal..."></textarea>
        <button id="analyzeBtn" onclick="analizarTexto()" style="margin-top: 12px;">Iniciar Análisis TDT</button>
    </div>

    <div id="resultCard" class="card" style="display: none;">
        <label>Resultado del Análisis:</label>
        <div id="result"></div>
    </div>
</div>



<script>
  async function analizarTexto() {
    const textInput = document.getElementById('textoInput').value;
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultCard = document.getElementById('resultCard');
    const resultDiv = document.getElementById('result');

    if (!textInput) {
      alert('Por favor, ingresá un texto o versículo.');
      return;
    }

    analyzeBtn.disabled = true;
    analyzeBtn.innerText = 'Analizando con Gemini...';
    resultCard.style.display = 'block';
    resultDiv.innerHTML = '<p class="loading">Analizando el texto con Inteligencia Artificial doctrinal...</p>';

    try {
      const response = await fetch('/api/analyze.js', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texto: textInput })
      });

      const data = await response.json();

      if (response.ok && data.resultado) {
        resultDiv.innerText = data.resultado;
      } else {
        resultDiv.innerText = 'Error del sistema: ' + (data.error || 'No se recibió respuesta.');
      }

    } catch (error) {
      resultDiv.innerText = 'Error de red: No se pudo conectar con el analizador.';
    } finally {
      analyzeBtn.disabled = false;
      analyzeBtn.innerText = 'Iniciar Análisis TDT';
    }
  }
</script>

</body>
</html>
